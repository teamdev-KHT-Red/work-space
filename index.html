<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris 2D</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/style2.css">
</head>

<body>
    <div id="title-screen" class="container vh-100 d-flex flex-column justify-content-center align-items-center">
        <h1 class="game-title">TETRIS</h1>
        <div class="button-wrapper w-100 d-flex flex-column align-items-center gap-3">
            <button id="start-btn" class="menu-btn btn-start">スタート</button>
            <button id="option-btn" class="menu-btn btn-option">オプション</button>
        </div>
    </div>

    <div id="game-screen" class="container min-vh-100 d-none flex-column align-items-center py-4" style="max-width: 600px;">
        
        <div class="w-100 d-flex justify-content-between align-items-center mb-3 px-3">
            <button id="btn-setting" class="btn btn-outline-secondary btn-sm text-white">設定</button>
            
            <h2 class="m-0 text-white fw-bold" style="letter-spacing: 2px;">TETRIS</h2>
            
            <div style="width: 46px;"></div>
        </div>

        <div class="row w-100 g-2">
            
            <div class="col-3 d-flex flex-column align-items-center">
                <div class="p-2 border border-secondary rounded bg-dark w-100 text-center" style="min-height: 80px;">
                    <small class="text-secondary d-block mb-1" style="font-size: 10px;">HOLD</small>
                    <canvas id = "holdCanvas" width = "80" height ="80"></canvas> <!-- ホールドピースのid --> 
                </div>
            </div>

            <div class="col-6 d-flex justify-content-center">
                <div style="padding: 4px; background-color: #111; border: 2px solid #444; border-radius: 4px;">
                    <canvas id="c"></canvas>
                </div>
            </div>

            <div class="col-3 d-flex flex-column gap-2">
                <div class="p-2 border border-secondary rounded bg-dark w-100 text-center" style="min-height: 80px;">
                    <small class="text-secondary d-block mb-1" style="font-size: 10px;">NEXT</small>
                    <canvas id="nextCanvas" width="80" height="80"></canvas><!--　ネクストピースのid -->
                </div>
                
                <div class="p-2 border border-secondary rounded bg-dark w-100 text-center">
                    <div class="mb-1">
                        <small class="text-secondary d-block" style="font-size: 10px;">スコア</small>
                        <span id="score" class="d-block text-white h6 m-0">0</span>
                    </div>
                    <div class="mb-1">
                        <small class="text-secondary d-block" style="font-size: 10px;">レベル</small>
                        <span id="level" class="d-block text-white h6 m-0">1</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="pauseModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">メニュー</h5>
                    <button type="button" class="btn-close btn-close-white" id="btn-modal-close"></button>
                </div>
                <div class="modal-body">
                    <div class="d-grid gap-3">
                        <button id="btn-title" class="btn btn-secondary">タイトルに戻る</button>
                        <button id="btn-reset" class="btn btn-secondary">リセット</button>
                        <button id="btn-option-modal" class="btn btn-secondary">オプション</button>
                        <button id="btn-resume" class="btn btn-success">ゲームに戻る</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- ゲームオーバー画面のモーダル表示を追加しました。 -->
    <div class="modal fade" id="gameOverModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-danger"> <div class="modal-header border-secondary justify-content-center">
                    <h5 class="modal-title fw-bold text-danger">GAME OVER</h5>
                </div>
                <div class="modal-body text-center">
                    <p class="mb-4">お疲れ様でした！</p>
                    <div class="d-grid gap-3">
                        <button id="btn-retry" class="btn btn-success btn-lg">もう一度遊ぶ</button>
                        <button id="btn-title-gameover" class="btn btn-secondary">タイトルに戻る</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio src="audio/sample.mp3" id="bgm" loop></audio>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="./src/startPage2d.js"></script>
</body>

</html>
